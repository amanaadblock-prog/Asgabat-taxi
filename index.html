<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi Game</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 60vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        
        .ui-container {
            position: fixed; bottom: 0; width: 100%; height: 40vh;
            background: #1a1a1a; border-top: 3px solid #f39c12;
            z-index: 100; padding: 15px; box-sizing: border-box;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #252525; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: bold; color: #f39c12; }

        .fuel-section { margin-top: 10px; }
        .fuel-bar { width: 100%; background: #333; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .fuel-fill { background: linear-gradient(90deg, #f39c12, #2ecc71); height: 100%; width: 100%; transition: 0.5s; }

        .action-btn {
            width: 100%; background: #f39c12; color: #000; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Balans (TMT)</div>
            <div class="stat-value" id="balance">121.39</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Aýlyk Girdeji</div>
            <div class="stat-value">+50.00</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Günlük Girdeji</div>
            <div class="stat-value">+1.66</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Sagatlyk</div>
            <div class="stat-value">+0.069</div>
        </div>
    </div>

    <div class="fuel-section">
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span>⛽ Benzin Rezwerwi</span>
            <span id="fuel-percent">100%</span>
        </div>
        <div class="fuel-bar"><div id="fuel-level" class="fuel-fill"></div></div>
    </div>

    <button class="action-btn" onclick="refillFuel()">Zaprawka Et (1 TMT)</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 150 manatlyk masyn hasaby
    let player = {
        balance: 121.39,
        hourlyProfit: 0.0694, // 150 / 3 ay / 30 gun / 24 sagat
        fuel: 100
    };

    var map = L.map('map', {zoomControl: false}).setView([37.94, 58.38], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448636.png', iconSize: [40, 40] });
    var car = L.marker([37.94, 58.38], {icon: carIcon}).addTo(map);

    // Esasy oýun sikly (Her 5 sekuntdan pul we benzin hasaplanýar)
    setInterval(() => {
        if (player.fuel > 0) {
            // Pul goşmak
            player.balance += (player.hourlyProfit / 720); // 5 sekuntlyk girdeji
            
            // Benzin azaltmak (3 günde gutarar ýaly)
            player.fuel -= (100 / 51840); 
            
            // Maşyny azajyk gymyldatmak
            let lat = car.getLatLng().lat + (Math.random() - 0.5) * 0.001;
            let lng = car.getLatLng().lng + (Math.random() - 0.5) * 0.001;
            car.setLatLng([lat, lng]);

            updateUI();
        }
    }, 5000);

    function updateUI() {
        document.getElementById('balance').innerText = player.balance.toFixed(4);
        document.getElementById('fuel-percent').innerText = Math.floor(player.fuel) + "%";
        document.getElementById('fuel-level').style.width = player.fuel + "%";
        
        if(player.fuel < 20) document.getElementById('fuel-level').style.background = "red";
    }

    function refillFuel() {
        if(player.balance >= 1) {
            player.balance -= 1;
            player.fuel = 100;
            updateUI();
            alert("Müşderi zaprawka etdi! Puly size geçdi.");
        } else {
            alert("Balansda pul ýok!");
        }
    }
</script>

</body>
</html>
