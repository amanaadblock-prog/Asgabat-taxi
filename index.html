<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aman Taxi - Performance Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: sans-serif; }
        .top-ui { position: fixed; top: 10px; width: 100%; z-index: 3000; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; pointer-events: none; }
        .refresh-btn { background: rgba(0,0,0,0.8); color: #fff; padding: 5px; border-radius: 50%; border: 1px solid #f39c12; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .m-balance { background: rgba(0,0,0,0.9); color: #f39c12; padding: 5px 12px; border-radius: 12px; border: 1px solid #f39c12; font-weight: bold; font-size: 11px; pointer-events: auto; }

        /* KARTA - OPTIMIZED */
        #map-holder { perspective: 1000px; width: 100%; height: 52vh; background: #000; overflow: hidden; }
        #map { height: 200%; width: 140%; left: -20%; top: -50%; transform: rotateX(50deg); filter: invert(100%) hue-rotate(180deg) brightness(90%); }

        .ui-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 48vh; 
            background: #111; border-top: 2px solid #f39c12; 
            z-index: 2000; padding: 15px 20px; 
            border-radius: 20px 20px 0 0; display: flex; flex-direction: column;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { background: #1a1a1a; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .val { font-size: 15px; font-weight: bold; color: #f39c12; }

        .fuel-wrap { background: #222; height: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; position: relative; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #e67e22, #27ae60); transition: 1s linear; }
        .fuel-text { position: absolute; width: 100%; text-align: center; font-size: 10px; color: white; top: 3px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.1s; }
        .btn-zap { background: #f39c12; color: #000; box-shadow: 0 4px 0 #d35400; }
        .btn-zap:active { transform: translateY(3px); box-shadow: 0 1px 0 #d35400; }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="refresh-btn" onclick="location.reload()">↻</div>
    <div class="m-balance">Müşteri: <span id="m-val">45.50</span> TMT</div>
</div>

<div id="map-holder"><div id="map"></div></div>

<div class="ui-panel">
    <div class="stats">
        <div class="box"><div style="color:#777;font-size:10px">BALANS</div><div id="balance" class="val">0.0000</div></div>
        <div class="box"><div style="color:#777;font-size:10px">SAGATLYK</div><div class="val">+0.069</div></div>
    </div>
    
    <div class="fuel-wrap">
        <div id="fuel-fill"></div>
        <div class="fuel-text">BENZIN: <span id="fuel-num">100</span>%</div>
    </div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <p style="text-align:center; color:#444; font-size:10px; margin-top:15px;">Aman Taxi v2.0 - Performance Mode Enabled</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Kartany iň ýeňil sazlamalar bilen açmak
    var map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false, 
        dragging: false, 
        touchZoom: false,
        doubleClickZoom: false,
        scrollWheelZoom: false,
        boxZoom: false
    }).setView([37.942, 58.385], 18);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    var marker = L.marker([37.942, 58.385], { icon: carIcon }).addTo(map);

    // SAVE SYSTEM & TURKEY OPTIMIZATION
    let hourly = 0.069;
    let state = {
        bal: parseFloat(localStorage.getItem('aman_bal')) || 121.4031,
        mBal: parseFloat(localStorage.getItem('aman_m_bal')) || 45.50,
        fuel: parseFloat(localStorage.getItem('aman_fuel')) || 100,
        lastTime: parseInt(localStorage.getItem('aman_time')) || Date.now()
    };

    // Offline Gazanç (Doňmazlygy üçin diňe bir gezek açylanda hasaplaýar)
    let diff = (Date.now() - state.lastTime) / 1000;
    if(diff > 0) {
        let earned = (diff / 3600) * hourly;
        state.bal += earned;
        state.mBal += (earned * 0.5);
        state.fuel = Math.max(5, state.fuel - (diff * 0.002));
    }

    function updateGame() {
        if(state.fuel > 0) {
            // Hereketi has "smooth" (ýumşak) we ýeňil etmek
            let lat = 37.942 + (Math.sin(Date.now()/5000) * 0.001);
            let lng = 58.385 + (Math.cos(Date.now()/5000) * 0.001);
            
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true, duration: 1.0 });

            state.bal += (hourly / 3600);
            state.mBal += (hourly / 7200);
            state.fuel -= 0.015;

            // UI täzelemek (Sekuntda 1 gezek)
            document.getElementById('balance').innerText = state.bal.toFixed(4);
            document.getElementById('m-val').innerText = state.mBal.toFixed(2);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
            document.getElementById('fuel-num').innerText = Math.round(state.fuel);

            // Maglumatlary ýatda sakla
            localStorage.setItem('aman_bal', state.bal);
            localStorage.setItem('aman_m_bal', state.mBal);
            localStorage.setItem('aman_fuel', state.fuel);
            localStorage.setItem('aman_time', Date.now());
        }
    }

    // Oýun siklyny işledýäris
    setInterval(updateGame, 1000);

    function refill() {
        if(state.bal >= 0.20) {
            state.bal -= 0.20;
            state.fuel = 100;
        } else {
            alert("Balansyňyzda ýeterlik pul ýok!");
        }
    }
</script>
</body>
</html>
