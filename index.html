<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Full Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        
        .ui-container {
            position: fixed; bottom: 0; width: 100%; height: 55vh;
            background: #1a1a1a; border-top: 3px solid #f39c12;
            z-index: 100; padding: 15px; box-sizing: border-box;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #252525; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 15px; font-weight: bold; color: #f39c12; }

        .fuel-section { margin-bottom: 15px; }
        .fuel-bar-bg { background: #333; height: 24px; border-radius: 12px; position: relative; border: 1px solid #444; overflow: hidden; }
        #fuel-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: 0.4s; }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 3px; font-size: 12px; font-weight: bold; color: white; text-shadow: 1px 1px 2px #000; }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-refill { background: #f39c12; color: #000; box-shadow: 0 4px 0 #d35400; }
        .btn-refill:active { transform: translateY(2px); box-shadow: 0 2px 0 #d35400; }
        .btn-shop { background: #2c3e50; color: #fff; border: 1px solid #34495e; }
        
        #shop-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Balans (TMT)</div><div class="stat-value" id="val-balance">121.3961</div></div>
        <div class="stat-box"><div class="stat-label">Aýlyk Girdeji</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div class="stat-label">Günlük Girdeji</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div class="stat-label">Sagatlyk</div><div class="stat-value">+0.069</div></div>
    </div>

    <div class="fuel-section">
        <div class="fuel-bar-bg">
            <div id="fuel-bar-fill"></div>
            <div id="fuel-text">Benzin: 100%</div>
        </div>
    </div>

    <button class="btn btn-refill" onclick="refill()">⛽ ZAPRAWKA ET (1 TMT)</button>
    <button class="btn btn-shop" onclick="openShop()">🛒 MAGAZIN / MAŞYN BAZARY</button>
</div>

<div id="shop-panel">
    <h2 style="text-align:center; color:#f39c12;">Maşyn Bazary</h2>
    <div style="background:#252525; padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid #444;">
        <p style="margin:0; font-weight:bold;">Toyota Prius</p>
        <p style="color:#888; font-size:12px;">+4.74 TMT / gün</p>
        <button class="btn btn-refill" style="margin-top:10px;">444 TMT SATYNAL</button>
    </div>
    <button class="btn btn-shop" style="background:#e74c3c" onclick="closeShop()">ÝAP</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Karta we Maşyn Sazlamalary
    var map = L.map('map', { zoomControl: false }).setView([37.94, 58.38], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Maşyn iconyny düzedeliň (Eger surat açylmasa, sary reňkli tegelek görkezer)
    var taxiIcon = L.divIcon({
        html: '<div style="background:#f1c40f; width:20px; height:20px; border-radius:50%; border:2px solid black; box-shadow: 0 0 10px gold;"></div>',
        className: 'custom-taxi',
        iconSize: [20, 20]
    });

    var carMarker = L.marker([37.94, 58.38], {icon: taxiIcon}).addTo(map);

    let state = { balance: 121.3961, fuel: 100 };

    function updateUI() {
        document.getElementById('val-balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-bar-fill').style.width = state.fuel + "%";
        document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
        
        // Reňk üýtgetme
        if(state.fuel < 20) document.getElementById('fuel-bar-fill').style.background = "#e74c3c";
        else document.getElementById('fuel-bar-fill').style.background = "linear-gradient(90deg, #27ae60, #2ecc71)";
    }

    // 2. Hereket Logikasy (Maşyn bökmez ýaly ýumşak hereket)
    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += 0.0001;
            state.fuel -= 0.02;

            // Maşyn diňe Aşgabadyň merkezinde gezýär
            let lat = carMarker.getLatLng().lat + (Math.random() - 0.5) * 0.002;
            let lng = carMarker.getLatLng().lng + (Math.random() - 0.5) * 0.002;

            carMarker.setLatLng([lat, lng]);
            map.panTo([lat, lng]); 
            updateUI();
        }
    }, 2000);

    // 3. Düwmeler
    function refill() { if(state.balance >= 1) { state.balance -= 1; state.fuel = 100; updateUI(); } }
    function openShop() { document.getElementById('shop-panel').style.display = 'block'; }
    function closeShop() { document.getElementById('shop-panel').style.display = 'none'; }

    updateUI();
</script>
</body>
</html>
