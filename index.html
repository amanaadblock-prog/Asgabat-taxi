<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aman Taxi - Real Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: sans-serif; }
        
        /* ÝOKARKY PANEL */
        .top-ui { position: fixed; top: 10px; width: 100%; z-index: 3000; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; }
        .refresh-btn { background: rgba(0,0,0,0.8); color: #fff; padding: 8px; border-radius: 50%; border: 1px solid #f39c12; cursor: pointer; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

        /* KARTA - OPTIMIZED */
        #map-holder { perspective: 1000px; width: 100%; height: 50vh; background: #000; overflow: hidden; }
        #map { height: 250%; width: 160%; left: -30%; top: -80%; transform: rotateX(55deg); filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* UI PANEL */
        .ui-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; 
            background: #111; border-top: 3px solid #f39c12; 
            z-index: 2000; padding: 15px 20px; 
            border-radius: 25px 25px 0 0; display: flex; flex-direction: column; gap: 10px;
        }

        .stat-card { background: #1c1c1c; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat-val { font-size: 22px; font-weight: bold; color: #f39c12; }

        .fuel-wrap { background: #222; height: 20px; border-radius: 10px; border: 1px solid #444; overflow: hidden; position: relative; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #d35400, #27ae60); transition: 0.5s; }
        .fuel-text { position: absolute; width: 100%; text-align: center; font-size: 10px; color: white; top: 3px; font-weight: bold; }

        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-ad { background: #27ae60; color: #fff; border: 1px solid #2ecc71; }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="refresh-btn" onclick="location.reload()">↻</div>
    <div style="color:#f39c12; font-weight:bold; font-size:12px; margin-top:8px;">Aman Taxi v4.0 Pro</div>
</div>

<div id="map-holder"><div id="map"></div></div>

<div class="ui-panel">
    <div class="stat-card">
        <div style="color:#888; font-size:10px; margin-bottom:5px;">UMUMY BALANS (TMT)</div>
        <div id="balance" class="stat-val">0.0000</div>
        <div id="hourly-rate" style="color:#27ae60; font-size:11px; margin-top:3px;">+0.069 TMT/sagat</div>
    </div>
    
    <div class="fuel-wrap">
        <div id="fuel-fill"></div>
        <div class="fuel-text">BENZIN: <span id="fuel-num">100</span>%</div>
    </div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-ad" onclick="watchAd()">📺 REKLAMA GÖR +0.50 TMT</button>

    <div style="text-align:center; color:#555; font-size:10px; margin-top:5px;">
        Türkiýe Optimized • Doňmaýan Rejim
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // KARTA SAZLAMALARY - MAŞYN BÖKMEZ ÝALY
    var map = L.map('map', { zoomControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView([37.942, 58.385], 18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // REALNY MAŞYN ICONY
    var carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png',
        iconSize: [42, 42],
        iconAnchor: [21, 21]
    });

    var marker = L.marker([37.942, 58.385], { icon: carIcon }).addTo(map);

    // OÝUN LOGIKASY (SAVE SYSTEM)
    let hourlyIncome = 0.069;
    let state = {
        bal: parseFloat(localStorage.getItem('aman_final_bal')) || 0,
        fuel: parseFloat(localStorage.getItem('aman_final_fuel')) || 100,
        lastTime: parseInt(localStorage.getItem('aman_final_time')) || Date.now()
    };

    // OFFLINE INCOME (Oýun ýapyk wagtyny hasapla)
    let diff = (Date.now() - state.lastTime) / 1000;
    if (diff > 0) {
        let earned = (diff / 3600) * hourlyIncome;
        state.bal += earned;
        state.fuel = Math.max(5, state.fuel - (diff * 0.003));
    }

    // SMOOTH HEREKET (Bökmezligi üçin)
    let moveCounter = 0;
    setInterval(() => {
        if(state.fuel > 0) {
            moveCounter += 0.03;
            let lat = 37.942 + (Math.sin(moveCounter) * 0.0008);
            let lng = 58.385 + (Math.cos(moveCounter) * 0.0008);
            
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true, duration: 1.0 });

            // Balans we Benzin Update
            state.bal += (hourlyIncome / 3600);
            state.fuel -= 0.018;

            // UI-ny täzele
            document.getElementById('balance').innerText = state.bal.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
            document.getElementById('fuel-num').innerText = Math.round(state.fuel);

            // Her sekuntda ýatda sakla
            localStorage.setItem('aman_final_bal', state.bal);
            localStorage.setItem('aman_final_fuel', state.fuel);
            localStorage.setItem('aman_final_time', Date.now());
        } else {
            document.getElementById('fuel-num').innerText = "BENZIN GUTARDY!";
        }
    }, 1000);

    // ZAPRAWKA FUNKSIÝASY
    function refill() {
        if(state.bal >= 0.20) {
            state.bal -= 0.20;
            state.fuel = 100;
            alert("Zaprawka edildi! -0.20 TMT");
        } else {
            alert("Puluňyz ýetenok!");
        }
    }

    // REKLAMA FUNKSIÝASY (Sen gazanýarsyň)
    function watchAd() {
        // Bu ýere Google AdMob ýa-da AppLovin kodlaryny goýup bilersiň
        alert("Reklama görkezilýär..."); 
        setTimeout(() => {
            state.bal += 0.50; // Reklama üçin baýrak
            alert("Gutlaýarys! 0.50 TMT balansyňyza goşuldy.");
        }, 2000);
    }
</script>
</body>
</html>
