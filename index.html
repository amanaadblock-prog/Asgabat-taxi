<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Ashgabat</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 50vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        
        .ui-container {
            position: fixed; bottom: 0; width: 100%; height: 50vh;
            background: #1a1a1a; border-top: 4px solid #f39c12;
            z-index: 100; padding: 20px; box-sizing: border-box;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #252525; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 16px; font-weight: bold; color: #f39c12; }

        /* Benzin barasy we duýduryş */
        .fuel-container { background: #333; height: 25px; border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 15px; border: 1px solid #444; }
        #fuel-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: 0.3s; }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 2px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .btn-refill { background: #f39c12; color: #000; box-shadow: 0 4px 0 #d35400; }
        .btn-refill:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Balans (TMT)</div><div class="stat-value" id="balance">121.3901</div></div>
        <div class="stat-box"><div class="stat-label">Girdeji</div><div class="stat-value">+1.66</div></div>
    </div>

    <div class="fuel-container">
        <div id="fuel-bar"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>

    <button class="btn btn-refill" onclick="refill()">🛢️ ZAPRAWKA ET (1 TMT)</button>
    <p id="msg" style="text-align:center; color:#e74c3c; font-size:12px; margin-top:10px;"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. KARTA ÇÄKLERINI GIŇELTDIK
    var bounds = L.latLngBounds([37.85, 58.25], [38.05, 58.55]);
    var map = L.map('map', { 
        zoomControl: false, 
        maxBounds: bounds, 
        maxBoundsViscosity: 1.0 
    }).setView([37.94, 58.38], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. TAKSI MARKERI
    var taxiIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448636.png',
        iconSize: [50, 50],
        iconAnchor: [25, 25]
    });
    var carMarker = L.marker([37.94, 58.38], {icon: taxiIcon}).addTo(map);

    let state = { balance: 121.3901, fuel: 100 };

    function updateUI() {
        document.getElementById('balance').innerText = state.balance.toFixed(4);
        
        let fuelBar = document.getElementById('fuel-bar');
        let fuelTxt = document.getElementById('fuel-text');
        
        fuelBar.style.width = state.fuel + "%";
        fuelTxt.innerText = "Benzin: " + Math.floor(state.fuel) + "%";

        // Benzin azalanda reňki üýtgeýär (Duýduryş)
        if(state.fuel < 20) {
            fuelBar.style.background = "#e74c3c"; // Gyzyl
            document.getElementById('msg').innerText = "Benzin gutarýar! Zaprawka et!";
        } else {
            fuelBar.style.background = "linear-gradient(90deg, #27ae60, #2ecc71)"; // Ýaşyl
            document.getElementById('msg').innerText = "";
        }
    }

    // 3. HEREKET LOGIKASY (Uzak aralyklar üçin)
    function moveCar() {
        if(state.fuel > 0) {
            state.balance += 0.0005;
            state.fuel -= 0.05; // Benzin ýuwaş-ýuwaş azalýar

            // Tötänleýin täze nokat (Has uzak aralyk: 0.015)
            let newLat = carMarker.getLatLng().lat + (Math.random() - 0.5) * 0.015;
            let newLng = carMarker.getLatLng().lng + (Math.random() - 0.5) * 0.015;

            if(bounds.contains([newLat, newLng])) {
                carMarker.setLatLng([newLat, newLng]);
                map.panTo([newLat, newLng]); // Karta hem maşyn bilen bile süýşýär
            }
            updateUI();
        } else {
            document.getElementById('msg').innerText = "BENZIN GUTARDY! MAŞYN DURDY.";
        }
    }

    setInterval(moveCar, 2000); // Her 2 sekuntdan uly böküş edýär

    function refill() {
        if(state.balance >= 1) {
            state.balance -= 1;
            state.fuel = 100;
            updateUI();
        }
    }

    updateUI();
</script>
</body>
</html>
