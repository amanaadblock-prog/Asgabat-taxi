<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Final</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; }
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 55vh; 
            background: #1a1a1a; border-top: 4px solid #f39c12; 
            padding: 20px; box-sizing: border-box; border-radius: 25px 25px 0 0;
            z-index: 1000;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 16px; font-weight: bold; color: #f39c12; }
        .fuel-bar { background: #333; height: 25px; border-radius: 12px; position: relative; margin-bottom: 20px; overflow: hidden; border: 1px solid #444; }
        #fuel-fill { height: 100%; width: 100%; background: #27ae60; transition: 1s linear; }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 4px; font-weight: bold; font-size: 12px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-zap { background: #f39c12; color: #000; }
        /* Maşynyň aýlanmagy üçin ýumşak geçiş */
        .car-icon { transition: transform 0.5s linear; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div>BALANS (TMT)</div><div id="val-balance" class="stat-value">121.4012</div></div>
        <div class="stat-box"><div>AÝLYK</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div>GÜNLÜK</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div>SAGATLYK</div><div class="stat-value">+0.069</div></div>
    </div>
    <div class="fuel-bar">
        <div id="fuel-fill"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>
    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn" style="background: #34495e; color: white;">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.942, 58.385], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // MAŞYN ICONASY (ÝOKARDAN GÖRNÜŞ)
    var taxiIcon = L.divIcon({
        html: `<div id="car-img" class="car-icon">
                <svg width="50" height="30" viewBox="0 0 50 30">
                    <rect x="5" y="5" width="40" height="20" rx="4" fill="#f1c40f" stroke="black" stroke-width="2"/>
                    <rect x="15" y="8" width="20" height="14" rx="2" fill="#333"/>
                    <rect x="22" y="5" width="6" height="2" fill="black"/> 
                </svg>
               </div>`,
        className: 'custom-marker',
        iconSize: [50, 30],
        iconAnchor: [25, 15]
    });

    const routes = [
        [37.9422, 58.3852], [37.9450, 58.3852], [37.9450, 58.3910], [37.9422, 58.3910]
    ];
    let routeIdx = 0;
    var marker = L.marker(routes[0], { icon: taxiIcon, zIndexOffset: 1000 }).addTo(map);

    let state = { balance: 121.4012, fuel: 100 };

    // Iki nokat arasyndaky burçy hasaplaýjy
    function getAngle(p1, p2) {
        return Math.atan2(p2[1] - p1[1], p2[0] - p1[0]) * 180 / Math.PI;
    }

    setInterval(() => {
        if(state.fuel > 0) {
            let currentPos = routes[routeIdx];
            routeIdx = (routeIdx + 1) % routes.length;
            let nextPos = routes[routeIdx];

            // Maşyny öwür
            let angle = getAngle(currentPos, nextPos);
            document.getElementById('car-img').style.transform = `rotate(${angle}deg)`;

            // Hereket et
            marker.setLatLng(nextPos);
            map.panTo(nextPos);

            // Balans we Benzin
            state.balance += 0.0001;
            state.fuel -= 0.5;
            
            document.getElementById('val-balance').innerText = state.balance.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
            document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
        }
    }, 3000);

    function refill() {
        if(state.balance >= 0.20) {
            state.balance -= 0.20;
            state.fuel = 100;
        }
    }
</script>
</body>
</html>
