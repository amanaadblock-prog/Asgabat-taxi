<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Žiguli 07 Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0b0b0b; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 3D KARTA DIZAÝNY */
        #map-holder {
            perspective: 1000px;
            width: 100%; height: 50vh;
            background: #000;
        }
        #map { 
            height: 150%; width: 100%; 
            transform: rotateX(45deg); /* Kartany ýapgytlandyrmak */
            margin-top: -25%;
            filter: invert(100%) hue-rotate(180deg) brightness(90%) contrast(90%); /* Gije režimi */
        }

        /* UI PANEL */
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 50vh; 
            background: #151515; border-top: 4px solid #f39c12; 
            z-index: 2000; padding: 20px; box-sizing: border-box; 
            border-radius: 30px 30px 0 0; box-shadow: 0 -20px 50px rgba(0,0,0,0.9);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #1e1e1e; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 10px; color: #888; margin-bottom: 4px; letter-spacing: 1px; }
        .stat-value { font-size: 16px; font-weight: bold; color: #f39c12; }

        .fuel-bar { background: #222; height: 20px; border-radius: 10px; position: relative; margin-bottom: 20px; overflow: hidden; border: 1px solid #444; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #e67e22, #27ae60); transition: 1s linear; }

        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 10px; font-size: 14px; transition: 0.2s; }
        .btn-zap { background: #f39c12; color: #000; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3); }
        .btn-shop { background: #2c3e50; color: white; }

        /* ŽIGULI MARKER */
        .car-rotate-wrapper { transition: transform 0.4s linear; position: relative; }
        .car-shadow { 
            position: absolute; top: 22px; left: 8px; 
            width: 45px; height: 15px; 
            background: rgba(0,0,0,0.6); filter: blur(5px); 
            border-radius: 50%; z-index: -1; 
        }
    </style>
</head>
<body>

<div id="map-holder">
    <div id="map"></div>
</div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">BALANS (TMT)</div><div id="val-balance" class="stat-value">121.4020</div></div>
        <div class="stat-box"><div class="stat-label">AÝLYK</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div class="stat-label">GÜNLÜK</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div class="stat-label">SAGATLYK</div><div class="stat-value">+0.069</div></div>
    </div>
    
    <div class="fuel-bar"><div id="fuel-fill"></div></div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.942, 58.385], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // ŽIGULI 07 MARKERI
    var zigulyIcon = L.divIcon({
        html: `
            <div id="car-wrap" class="car-rotate-wrapper">
                <div class="car-shadow"></div>
                <img src="https://i.imgur.com/39A06Yt.png" style="width: 55px; transform: rotate(0deg);">
            </div>`,
        className: 'custom-marker',
        iconSize: [60, 60],
        iconAnchor: [30, 30]
    });

    const routes = [[37.9422, 58.3852], [37.9445, 58.3852], [37.9445, 58.3900], [37.9422, 58.3900]];
    let routeIdx = 0;
    var marker = L.marker(routes[0], { icon: zigulyIcon, zIndexOffset: 2000 }).addTo(map);

    let state = { balance: 121.4020, fuel: 100 };

    function getAngle(p1, p2) {
        return Math.atan2(p2[1] - p1[1], p2[0] - p1[0]) * 180 / Math.PI;
    }

    setInterval(() => {
        if(state.fuel > 0) {
            let currentPos = routes[routeIdx];
            routeIdx = (routeIdx + 1) % routes.length;
            let nextPos = routes[routeIdx];

            // Žigulini öwür (07-leriň öwrülişi ýaly dikräk)
            let angle = getAngle(currentPos, nextPos);
            let carWrap = document.getElementById('car-wrap');
            if(carWrap) carWrap.style.transform = `rotate(${angle}deg)`;

            marker.setLatLng(nextPos);
            map.panTo(nextPos, { animate: true, duration: 2 });

            // Gazanç we Benzin
            state.balance += 0.0001;
            state.fuel -= 0.5;
            document.getElementById('val-balance').innerText = state.balance.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
        }
    }, 3000);

    function refill() {
        if(state.balance >= 0.20) {
            state.balance -= 0.20;
            state.fuel = 100;
            document.getElementById('val-balance').innerText = state.balance.toFixed(4);
            document.getElementById('fuel-fill').style.width = "100%";
        }
    }
</script>
</body>
</html>
