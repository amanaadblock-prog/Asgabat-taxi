<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Fixed View</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 55vh; 
            background: #1a1a1a; border-top: 4px solid #f39c12; 
            z-index: 100; padding: 15px; box-sizing: border-box; 
            border-radius: 25px 25px 0 0;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 15px; font-weight: bold; color: #f39c12; }
        .fuel-bar-wrap { background: #333; height: 24px; border-radius: 12px; position: relative; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: 0.5s; }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 3px; font-size: 12px; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-shop { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div>BALANS (TMT)</div><div id="val-balance" class="stat-value">121.4012</div></div>
        <div class="stat-box"><div>AÝLYK</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div>GÜNLÜK</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div>SAGATLYK</div><div class="stat-value">+0.069</div></div>
    </div>
    <div class="fuel-bar-wrap">
        <div id="fuel-fill"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>
    <button class="btn btn-zap">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Karta we Zoom sazlamalary
    var map = L.map('map', { zoomControl: false }).setView([37.942, 58.385], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. MAŞYN ICONASY - Göni SVG (Bloklanmaýar we dury görünýär)
    var taxiIcon = L.divIcon({
        html: `
            <div style="transform: rotate(0deg); filter: drop-shadow(0 0 4px black);">
                <svg width="50" height="30" viewBox="0 0 50 30">
                    <rect x="5" y="10" width="40" height="15" rx="3" fill="#ffdb05" stroke="#000" stroke-width="2"/>
                    <rect x="15" y="5" width="20" height="8" rx="2" fill="#87ceeb" stroke="#000" stroke-width="1.5"/>
                    <circle cx="12" cy="25" r="5" fill="#000"/>
                    <circle cx="38" cy="25" r="5" fill="#000"/>
                    <rect x="22" y="11" width="6" height="2" fill="#000"/> 
                </svg>
            </div>`,
        className: 'custom-taxi',
        iconSize: [50, 30],
        iconAnchor: [25, 15]
    });

    // 3. Maşyn ýollary (Aşgabat köçeleri)
    const routes = [
        [37.9422, 58.3852], [37.9435, 58.3852], [37.9450, 58.3852], 
        [37.9450, 58.3880], [37.9450, 58.3910], [37.9430, 58.3910], 
        [37.9422, 58.3910], [37.9422, 58.3880]
    ];
    let routeIdx = 0;

    // 4. Markeri goşmak (zIndexOffset maşyny öňe çykarýar)
    var marker = L.marker(routes[0], { icon: taxiIcon, zIndexOffset: 1000 }).addTo(map);

    let state = {
        balance: 121.4012,
        fuel: 100,
        income: 0.0001
    };

    function updateUI() {
        document.getElementById('val-balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-fill').style.width = state.fuel + "%";
        document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
    }

    // 5. Hereket we Balans
    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += state.income;
            state.fuel -= 0.005;

            routeIdx = (routeIdx + 1) % routes.length;
            let nextPos = routes[routeIdx];
            
            marker.setLatLng(nextPos);
            map.panTo(nextPos); 
            
            updateUI();
        }
    }, 2000);

    updateUI();
</script>
</body>
</html>
