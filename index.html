<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Zhiguli Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 55vh; 
            background: #1a1a1a; border-top: 4px solid #f39c12; 
            z-index: 100; padding: 15px; box-sizing: border-box; 
            border-radius: 25px 25px 0 0;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 15px; font-weight: bold; color: #f39c12; }
        .fuel-bar-wrap { background: #333; height: 24px; border-radius: 12px; position: relative; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: 0.5s; }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 3px; font-size: 12px; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; margin-bottom: 8px; cursor: pointer; }
        .btn-zap { background: #f39c12; color: #000; box-shadow: 0 4px #d35400; }
        .btn-shop { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div>BALANS (TMT)</div><div id="val-balance" class="stat-value">121.4007</div></div>
        <div class="stat-box"><div>AÝLYK</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div>GÜNLÜK</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div>SAGATLYK</div><div class="stat-value">+0.069</div></div>
    </div>

    <div class="fuel-bar-wrap">
        <div id="fuel-fill"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.942, 58.385], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // HAKYKY ZIGULI ICONASI (SVG kody - Suratyň açylman galmak gorkusy ýok)
    var zhiguliSVG = `
        <svg width="50" height="30" viewBox="0 0 50 30" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="10" width="40" height="15" rx="3" fill="#f1c40f" stroke="#000" stroke-width="1"/>
            <rect x="12" y="5" width="20" height="8" rx="2" fill="#d1d8e0" stroke="#000" stroke-width="1"/>
            <circle cx="12" cy="25" r="4" fill="#2d3436"/>
            <circle cx="38" cy="25" r="4" fill="#2d3436"/>
            <rect x="42" y="15" width="3" height="5" fill="#e74c3c"/> <rect x="5" y="15" width="3" height="5" fill="#ecf0f1"/> <rect x="18" y="11" width="10" height="2" fill="#000"/> </svg>`;

    var taxiIcon = L.divIcon({
        html: zhiguliSVG,
        className: 'zhiguli-icon',
        iconSize: [50, 30],
        iconAnchor: [25, 15]
    });

    // AŞGABAT KÖÇELERI (Ýol ugry - Köne şäher tarap)
    const routes = [
        [37.942, 58.385], [37.944, 58.385], [37.946, 58.385],
        [37.946, 58.388], [37.944, 58.391], [37.941, 58.391], [37.941, 58.388]
    ];
    let routeIdx = 0;
    var marker = L.marker(routes[0], {icon: taxiIcon}).addTo(map);

    let state = {
        balance: 121.4007,
        fuel: 100,
        income: 0.0001
    };

    function updateUI() {
        document.getElementById('val-balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-fill').style.width = state.fuel + "%";
        document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
    }

    // HEREKET WE BALANS
    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += state.income;
            state.fuel -= 0.005; // 2 gün gider ýaly

            routeIdx = (routeIdx + 1) % routes.length;
            let nextPos = routes[routeIdx];
            
            // Maşynyň ugruna görä öwrülmegi
            marker.setLatLng(nextPos);
            map.panTo(nextPos); 
            
            updateUI();
        }
    }, 2000);

    function refill() {
        if(state.balance >= 0.20) {
            state.balance -= 0.20;
            state.fuel = 100;
            updateUI();
        }
    }
    updateUI();
</script>
</body>
</html>
