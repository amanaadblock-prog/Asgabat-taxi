<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aman Taxi Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: sans-serif; }
        
        /* ÝOKARKY IKONKALAR */
        .top-ui { position: fixed; top: 15px; width: 100%; z-index: 3000; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .refresh-btn { background: rgba(0,0,0,0.6); color: #fff; padding: 10px; border-radius: 50%; border: 1px solid #f39c12; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .m-balance { background: rgba(0,0,0,0.7); color: #f39c12; padding: 8px 15px; border-radius: 20px; border: 1px solid #f39c12; font-weight: bold; font-size: 14px; }

        /* KARTA 3D */
        #map-holder { perspective: 1200px; width: 100%; height: 50vh; background: #000; overflow: hidden; }
        #map { height: 250%; width: 160%; left: -30%; top: -80%; transform: rotateX(55deg); filter: invert(100%) hue-rotate(180deg) brightness(85%); }

        /* AŞAKY PANEL - IŇ AŞAGYNA ÇENLI */
        .ui-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; 
            background: #121212; border-top: 3px solid #f39c12; 
            z-index: 2000; padding: 20px 20px env(safe-area-inset-bottom); 
            border-radius: 25px 25px 0 0; display: flex; flex-direction: column;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { background: #1c1c1c; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .val { font-size: 16px; font-weight: bold; color: #f39c12; }

        .fuel-wrap { background: #222; height: 22px; border-radius: 11px; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #d35400, #27ae60); transition: 0.5s; }

        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 10px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-shop { background: #34495e; color: white; }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="refresh-btn" onclick="location.reload()">↻</div>
    <div class="m-balance">Müşteri: <span id="m-val">45.50</span> TMT</div>
</div>

<div id="map-holder">
    <div id="map"></div>
</div>

<div class="ui-panel">
    <div class="stats">
        <div class="box"><div style="color:#888;font-size:10px">BALANS (TMT)</div><div id="balance" class="val">121.4031</div></div>
        <div class="box"><div style="color:#888;font-size:10px">AÝLYK</div><div class="val">+50.00</div></div>
        <div class="box"><div style="color:#888;font-size:10px">GÜNLÜK</div><div class="val">+1.66</div></div>
        <div class="box"><div style="color:#888;font-size:10px">SAGATLYK</div><div class="val">+0.069</div></div>
    </div>
    <div class="fuel-wrap"><div id="fuel-fill"></div></div>
    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop" onclick="alert('Bazar tiz wagtdan açylar!')">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.942, 58.385], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var carIcon = L.divIcon({
        html: `<div id="car-rotate" style="transition: transform 0.4s linear;">
            <div style="position: absolute; top: 20px; left: 5px; width: 45px; height: 15px; background: rgba(0,0,0,0.5); filter: blur(4px); border-radius: 50%; z-index: -1;"></div>
            <svg width="55" height="30" viewBox="0 0 100 50">
                <rect x="5" y="10" width="90" height="30" rx="4" fill="#f1c40f" stroke="#000" stroke-width="2"/>
                <path d="M25 10 L35 2 L65 2 L75 10 Z" fill="#333" stroke="#000" stroke-width="2"/>
                <rect x="15" y="12" width="10" height="6" fill="#fff" opacity="0.6"/><rect x="75" y="12" width="10" height="6" fill="#fff" opacity="0.6"/>
            </svg>
        </div>`,
        className: 'custom-icon', iconSize: [55, 30], iconAnchor: [27, 15]
    });

    var marker = L.marker([37.942, 58.385], { icon: carIcon }).addTo(map);
    let state = { bal: 121.4031, fuel: 100, mBal: 45.50 };

    setInterval(() => {
        if(state.fuel > 0) {
            let lat = 37.942 + (Math.random() - 0.5) * 0.003;
            let lng = 58.385 + (Math.random() - 0.5) * 0.003;
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true });
            state.bal += 0.0001;
            state.fuel -= 0.4;
            document.getElementById('balance').innerText = state.bal.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
        }
    }, 3000);

    function refill() {
        if(state.bal >= 0.20) {
            state.bal -= 0.20; state.fuel = 100;
            document.getElementById('balance').innerText = state.bal.toFixed(4);
            document.getElementById('fuel-fill').style.width = "100%";
        } else { alert("Pul ýetirňok!"); }
    }
</script>
</body>
</html>
