<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aman Taxi Pro - Original Design</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: sans-serif; }
        
        /* ÝOKARKY PANEL (MÜŞTERI) */
        .top-ui { position: fixed; top: 10px; width: 100%; z-index: 3000; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; }
        .refresh-btn { background: rgba(0,0,0,0.6); color: #fff; padding: 8px; border-radius: 50%; border: 1px solid #f39c12; cursor: pointer; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .m-balance { background: rgba(0,0,0,0.7); color: #f39c12; padding: 5px 12px; border-radius: 15px; border: 1px solid #f39c12; font-weight: bold; font-size: 12px; }

        /* KARTA */
        #map-holder { perspective: 1200px; width: 100%; height: 50vh; background: #000; overflow: hidden; }
        #map { height: 250%; width: 160%; left: -30%; top: -80%; transform: rotateX(55deg); filter: invert(100%) hue-rotate(180deg) brightness(85%); }

        /* AŞAKY PANEL (ORIGINAL) */
        .ui-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; 
            background: #121212; border-top: 3px solid #f39c12; 
            z-index: 2000; padding: 15px 20px; 
            border-radius: 25px 25px 0 0; display: flex; flex-direction: column;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .box { background: #1c1c1c; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .val { font-size: 14px; font-weight: bold; color: #f39c12; }

        .fuel-wrap { background: #222; height: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; position: relative; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #d35400, #27ae60); transition: 0.5s; }
        .fuel-text { position: absolute; width: 100%; text-align: center; font-size: 10px; color: white; top: 2px; font-weight: bold; }

        .btn { width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 8px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-shop { background: #34495e; color: white; }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="refresh-btn" onclick="location.reload()">↻</div>
    <div class="m-balance">Müşteri: <span id="m-val">0.00</span> TMT</div>
</div>

<div id="map-holder"><div id="map"></div></div>

<div class="ui-panel">
    <div class="stats">
        <div class="box"><div style="color:#888;font-size:9px uppercase">BALANS (TMT)</div><div id="balance" class="val">0.0000</div></div>
        <div class="box"><div style="color:#888;font-size:9px uppercase">AÝLYK</div><div class="val">+50.00</div></div>
        <div class="box"><div style="color:#888;font-size:9px uppercase">GÜNLÜK</div><div class="val">+1.66</div></div>
        <div class="box"><div style="color:#888;font-size:9px uppercase">SAGATLYK</div><div class="val">+0.069</div></div>
    </div>
    
    <div class="fuel-wrap">
        <div id="fuel-fill"></div>
        <div class="fuel-text">Benzin: <span id="fuel-num">100</span>%</div>
    </div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop" onclick="alert('Magazin ýakynda açylar!')">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.942, 58.385], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var carIcon = L.divIcon({
        html: `<div id="car-rotate"><svg width="50" height="25" viewBox="0 0 100 50"><rect x="5" y="10" width="90" height="30" rx="4" fill="#f1c40f" stroke="#000" stroke-width="2"/><path d="M25 10 L35 2 L65 2 L75 10 Z" fill="#333" stroke="#000" stroke-width="2"/></svg></div>`,
        className: 'custom-icon', iconSize: [50, 25], iconAnchor: [25, 12]
    });

    var marker = L.marker([37.942, 58.385], { icon: carIcon }).addTo(map);

    // SAVE SYSTEM (React kodundaky ýaly güýçli)
    let totalHourly = 0.069;
    let savedBal = parseFloat(localStorage.getItem('aman_taxi_bal')) || 0;
    let savedFuel = parseFloat(localStorage.getItem('aman_taxi_fuel')) || 100;
    let lastTime = localStorage.getItem('aman_taxi_time') || Date.now();

    // OFFLINE INCOME
    let diff = (Date.now() - lastTime) / 1000;
    let earnings = (diff / 3600) * totalHourly;

    let state = {
        bal: savedBal + earnings,
        fuel: savedFuel
    };

    setInterval(() => {
        if(state.fuel > 0) {
            // Hereket
            let lat = 37.942 + (Math.random() - 0.5) * 0.002;
            let lng = 58.385 + (Math.random() - 0.5) * 0.002;
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true });

            // Balans we Benzin
            state.bal += (totalHourly / 3600);
            state.fuel -= 0.05;

            // UI Update
            document.getElementById('balance').innerText = state.bal.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
            document.getElementById('fuel-num').innerText = Math.max(0, state.fuel.toFixed(0));

            // Save
            localStorage.setItem('aman_taxi_bal', state.bal);
            localStorage.setItem('aman_taxi_fuel', state.fuel);
            localStorage.setItem('aman_taxi_time', Date.now());
        }
    }, 1000);

    function refill() {
        if(state.bal >= 0.20) {
            state.bal -= 0.20;
            state.fuel = 100;
            localStorage.setItem('aman_taxi_bal', state.bal);
            localStorage.setItem('aman_taxi_fuel', 100);
        } else {
            alert("Pul ýetenok!");
        }
    }
</script>
</body>
</html>
