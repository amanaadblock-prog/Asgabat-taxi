<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Ashgabat</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 55vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        
        .ui-container {
            position: fixed; bottom: 0; width: 100%; height: 45vh;
            background: #1a1a1a; border-top: 3px solid #f39c12;
            z-index: 100; padding: 15px; box-sizing: border-box;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-box { background: #252525; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: bold; color: #f39c12; }

        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 14px; }
        .btn-refill { background: #f39c12; color: #000; }
        .btn-shop { background: #34495e; color: #fff; margin-top: 10px; }

        #shop-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.98); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .shop-card { background: #252525; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #444; text-align: center; }
        .car-img { width: 100%; max-width: 180px; height: 110px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Balans (TMT)</div><div class="stat-value" id="balance">121.3901</div></div>
        <div class="stat-box"><div class="stat-label">Benzin</div><div class="stat-value"><span id="fuel-txt">100</span>%</div></div>
        <div class="stat-box"><div class="stat-label">Günlük Girdeji</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div class="stat-label">Sagatlyk</div><div class="stat-value">+0.069</div></div>
    </div>
    <button class="btn btn-refill" onclick="refill()">Zaprawka Et (1 TMT)</button>
    <button class="btn btn-shop" onclick="toggleShop(true)">🛒 Magazin</button>
</div>

<div id="shop-overlay">
    <h2 style="color:#f39c12; text-align:center;">Maşyn Bazary</h2>
    <div class="shop-card">
        <img src="https://images.info-cars.com/Hyundai-Accent-Sedan-2020_1.jpg" class="car-img">
        <div style="font-weight:bold; color:#f39c12;">Hyundai Accent</div>
        <button class="btn btn-refill">261 TMT</button>
    </div>
    <div class="shop-card">
        <img src="https://toyota.com.tm/uploads/models/prius/colors/white.png" class="car-img">
        <div style="font-weight:bold; color:#f39c12;">Toyota Prius</div>
        <button class="btn btn-refill">444 TMT</button>
    </div>
    <button class="btn" style="background:#e74c3c" onclick="toggleShop(false)">Yza Gaýt</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. KARTA SAZLAMALARY (Dine Asgabat)
    var bounds = L.latLngBounds([37.85, 58.25], [38.05, 58.55]);
    var map = L.map('map', { 
        zoomControl: false, 
        maxBounds: bounds, 
        maxBoundsViscosity: 1.0 
    }).setView([37.94, 58.38], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. MASYN MARKER (HOKMAN GORUNJEK USUL)
    var taxiIcon = L.divIcon({
        html: '<div style="font-size: 30px;">🚕</div>',
        className: 'custom-taxi-icon',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });
    
    var carMarker = L.marker([37.94, 58.38], {icon: taxiIcon}).addTo(map);

    // 3. OYUN LOGIKASY
    let state = { balance: 121.3901, fuel: 100 };

    function updateUI() {
        document.getElementById('balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-txt').innerText = Math.floor(state.fuel);
    }

    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += 0.0001; // Balans hokman kopelyar
            state.fuel -= 0.01;
            
            let lat = carMarker.getLatLng().lat + (Math.random() - 0.5) * 0.0004;
            let lng = carMarker.getLatLng().lng + (Math.random() - 0.5) * 0.0004;
            
            if(bounds.contains([lat, lng])) {
                carMarker.setLatLng([lat, lng]);
            }
            updateUI();
        }
    }, 1000);

    function toggleShop(show) { document.getElementById('shop-overlay').style.display = show ? "block" : "none"; }
    function refill() { if(state.balance >= 1) { state.balance -= 1; state.fuel = 100; updateUI(); } }
</script>
</body>
</html>
