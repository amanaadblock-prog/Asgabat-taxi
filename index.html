<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Real 07</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0b0b0b; overflow: hidden; font-family: sans-serif; }
        
        /* KARTANYŇ GYRALARYNY DÜZETMEK */
        #map-holder {
            perspective: 1200px;
            width: 100%; height: 50vh;
            background: #000;
            overflow: hidden;
            /* Ýokarsyny we gapdalyny ýumşatmak */
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }
        #map { 
            height: 160%; width: 120%; 
            transform: rotateX(50deg) translateY(-10%) translateX(-10%); 
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(90%);
        }

        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 52vh; 
            background: #121212; border-top: 3px solid #f39c12; 
            z-index: 2000; padding: 20px; border-radius: 25px 25px 0 0;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.8);
        }

        /* ŽIGULI 07 SVG (BU SURAT HIÇ WAGT ÝITMEZ) */
        .car-07 {
            width: 50px;
            filter: drop-shadow(0 8px 5px rgba(0,0,0,0.7));
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #1c1c1c; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 16px; font-weight: bold; color: #f39c12; }
        
        .fuel-bar { background: #222; height: 22px; border-radius: 11px; margin-bottom: 15px; overflow: hidden; border: 1px solid #444; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #d35400, #27ae60); transition: 0.5s; }

        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div id="map-holder">
    <div id="map"></div>
</div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div style="color:#888;font-size:10px">BALANS (TMT)</div><div id="val-balance" class="stat-value">121.0025</div></div>
        <div class="stat-box"><div style="color:#888;font-size:10px">AÝLYK</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div style="color:#888;font-size:10px">GÜNLÜK</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div style="color:#888;font-size:10px">SAGATLYK</div><div class="stat-value">+0.069</div></div>
    </div>
    <div class="fuel-bar"><div id="fuel-fill"></div></div>
    <button class="btn" style="background: #f39c12; color: #000;" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn" style="background: #34495e; color: white;">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.942, 58.385], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // ŽIGULI 07 - SVG GÖRNÜŞI (Internet gerek däl, hemişe görner)
    var carIcon = L.divIcon({
        html: `<div id="car-dir" style="transition: transform 0.5s linear;">
            <svg class="car-07" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="10" width="80" height="40" rx="5" fill="#f1c40f" />
                <rect x="25" y="15" width="50" height="30" rx="3" fill="#333" />
                <rect x="15" y="12" width="10" height="5" fill="#fff" opacity="0.6" />
                <circle cx="20" cy="52" r="8" fill="#000" />
                <circle cx="80" cy="52" r="8" fill="#000" />
            </svg>
        </div>`,
        className: 'custom-marker',
        iconSize: [50, 50],
        iconAnchor: [25, 25]
    });

    var marker = L.marker([37.942, 58.385], { icon: carIcon }).addTo(map);
    let state = { balance: 121.0025, fuel: 100 };

    setInterval(() => {
        if(state.fuel > 0) {
            let lat = 37.942 + (Math.random() - 0.5) * 0.005;
            let lng = 58.385 + (Math.random() - 0.5) * 0.005;
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true });
            
            state.balance += 0.0001;
            state.fuel -= 0.1;
            document.getElementById('val-balance').innerText = state.balance.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
        }
    }, 3000);

    function refill() { if(state.balance >= 0.20) { state.balance -= 0.20; state.fuel = 100; } }
</script>
</body>
</html>
