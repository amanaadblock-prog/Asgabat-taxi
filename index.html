<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi Game</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 1; }
        
        /* Ýokarky Balans Paneli */
        .top-ui {
            position: fixed; top: 15px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .stat-card {
            background: rgba(20, 20, 20, 0.9); padding: 10px 20px;
            border-radius: 15px; border: 1px solid #f39c12; color: #f39c12; font-weight: bold;
        }

        /* Oýun Bölümleri (Popup) */
        .game-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; z-index: 500; display: none; padding: 20px; box-sizing: border-box;
        }
        .active-screen { display: block; }

        /* Maşyn Kartlary */
        .car-shop-item {
            background: #252525; border-radius: 15px; padding: 15px;
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
        }
        .car-shop-item img { width: 80px; }
        
        /* Aşaky Menýu */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #1a1a1a;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 2px solid #f39c12; z-index: 1000;
        }
        .nav-btn { color: #888; text-align: center; cursor: pointer; }
        .nav-btn.active { color: #f39c12; }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="stat-card">💰 <span id="balance">121.39</span> TMT</div>
    <div class="stat-card">🚕 <span id="car-count">2</span> Maşyn</div>
</div>

<div id="map"></div>

<div id="shop-screen" class="game-screen">
    <h2>Maşyn Dükany</h2>
    <div class="car-shop-item">
        <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
        <div>
            <b>Hyundai Accent</b><br>
            <span style="color: #2ecc71;">+0.11 TMT/sag</span>
        </div>
        <button onclick="buyCar(261)" style="background:#f39c12; border:none; padding:10px; border-radius:10px;">261 TMT</button>
    </div>
    <button onclick="closeScreens()" style="width:100%; padding:15px; margin-top:20px;">Yza gaýt</button>
</div>

<div class="nav-bar">
    <div class="nav-btn" onclick="openScreen('shop')">🛒<br>Magazin</div>
    <div class="nav-btn active" onclick="closeScreens()">🚕<br>Şäher</div>
    <div class="nav-btn">👤<br>Profil</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Karta Sazlamalary
    var map = L.map('map', {zoomControl: false}).setView([37.94, 58.38], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Maşynlary Hereket ETDİRMEK (Logic)
    var cars = [];
    function addMovingCar(lat, lng) {
        var marker = L.marker([lat, lng], {
            icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448636.png', iconSize: [35, 35] })
        }).addTo(map);
        
        // Ýönekeý hereket animasiýasy
        setInterval(() => {
            let newLat = marker.getLatLng().lat + (Math.random() - 0.5) * 0.001;
            let newLng = marker.getLatLng().lng + (Math.random() - 0.5) * 0.001;
            marker.setLatLng([newLat, newLng]);
        }, 3000);
    }

    // Başlangyç maşynlar
    addMovingCar(37.94, 58.38);
    addMovingCar(37.95, 58.39);

    // Menýu Funksiýalary
    function openScreen(name) {
        document.getElementById('shop-screen').classList.add('active-screen');
    }
    function closeScreens() {
        document.getElementById('shop-screen').classList.remove('active-screen');
    }

    // Pul Gazanmak Logikasy (Her 5 sekuntdan pul goşulýar)
    setInterval(() => {
        let bal = parseFloat(document.getElementById('balance').innerText);
        document.getElementById('balance').innerText = (bal + 0.01).toFixed(2);
    }, 5000);
</script>

</body>
</html>
