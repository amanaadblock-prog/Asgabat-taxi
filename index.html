<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Earn Money</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: sans-serif; color: white; }
        
        /* KARTA MEÝDANY */
        #map { height: 50vh; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* UI PANEL */
        .ui-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; 
            background: #111; border-top: 2px solid #f39c12; 
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-val { font-size: 18px; font-weight: bold; color: #f39c12; margin-top: 5px; }

        .fuel-bar { background: #222; height: 20px; border-radius: 10px; border: 1px solid #444; overflow: hidden; position: relative; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #e67e22, #27ae60); transition: 0.5s; }
        .fuel-txt { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 3px; font-weight: bold; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-ad { background: #27ae60; color: #fff; margin-top: 5px; } /* Reklama düwmesi */
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div class="stats-grid">
        <div class="stat-box">
            <div style="font-size: 10px; color: #888;">BALANS (TMT)</div>
            <div id="balance" class="stat-val">0.0000</div>
        </div>
        <div class="stat-box">
            <div style="font-size: 10px; color: #888;">SAGATLYK</div>
            <div class="stat-val text-green-500">+0.069</div>
        </div>
    </div>
    
    <div class="fuel-bar">
        <div id="fuel-fill"></div>
        <div class="fuel-txt">BENZIN: <span id="fuel-num">100</span>%</div>
    </div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    
    <button class="btn btn-ad" onclick="showAd()">📺 MUGT PUL AL (REKLAMA)</button>
    
    <div style="text-align: center; font-size: 9px; color: #444; margin-top: 10px;">Aman Taxi v3.0 • Optimized for Ads</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Karta sazlamalary - Maşyn bökmezligi üçin ýeňilleşdirildi
    var map = L.map('map', { zoomControl: false, dragging: false, scrollWheelZoom: false }).setView([37.942, 58.385], 18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png',
        iconSize: [35, 35],
        iconAnchor: [17, 17]
    });

    var marker = L.marker([37.942, 58.385], { icon: carIcon }).addTo(map);

    // LOGIKA
    let hourly = 0.069;
    let state = {
        bal: 0.0000, // Balans 0-dan başlaýar
        fuel: 100
    };

    // Maşyn Hereketi - Bökmezligi üçin kiçi ädimler bilen
    let angle = 0;
    setInterval(() => {
        if(state.fuel > 0) {
            angle += 0.02;
            let lat = 37.942 + (Math.sin(angle) * 0.0005);
            let lng = 58.385 + (Math.cos(angle) * 0.0005);
            
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true, duration: 1 });

            // Gazanç
            state.bal += (hourly / 3600);
            state.fuel -= 0.01;

            // UI Update
            document.getElementById('balance').innerText = state.bal.toFixed(4);
            document.getElementById('fuel-fill').style.width = state.fuel + "%";
            document.getElementById('fuel-num').innerText = Math.round(state.fuel);
        }
    }, 1000);

    function refill() {
        if(state.bal >= 0.20) {
            state.bal -= 0.20;
            state.fuel = 100;
        }
    }

    // REKLAMA FUNKSIÝASY
    function showAd() {
        alert("Reklama görkezilýär... (Bärde Google AdMob kody durmaly)");
        // Reklama gutaranda beriljek baýrak:
        state.bal += 0.50; // 0.50 TMT sowgat berýär
        alert("Gutlaýarys! Reklama üçin 0.50 TMT gazandyňyz.");
    }
</script>
</body>
</html>
