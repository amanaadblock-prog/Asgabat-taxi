<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi Game - Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        
        /* UI Elementler */
        .top-stats {
            position: fixed; top: 10px; width: 100%; display: flex; 
            justify-content: center; gap: 10px; z-index: 1000;
        }
        .stat-badge {
            background: rgba(26, 26, 26, 0.9); padding: 8px 15px; 
            border-radius: 20px; border: 1px solid #f39c12; color: #f39c12; font-weight: bold;
        }

        .game-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 2000; display: none; padding: 20px; 
            box-sizing: border-box; overflow-y: auto; padding-bottom: 80px;
        }
        .active-screen { display: block; }

        /* Magazin Dizaýny */
        .shop-card {
            background: #1a1a1a; border-radius: 15px; padding: 15px;
            margin-bottom: 15px; border: 1px solid #333; display: flex; align-items: center;
        }
        .shop-card img { width: 100px; margin-right: 15px; }
        .buy-btn {
            background: #f39c12; color: black; border: none; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Navigasiýa */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #1a1a1a;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 2px solid #f39c12; z-index: 3000;
        }
        .nav-item { color: #888; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #f39c12; }
    </style>
</head>
<body>

<div class="top-stats">
    <div class="stat-badge">💰 <span id="balance">121.39</span> TMT</div>
    <div class="stat-badge">⛽ <span id="fuel-val">100</span>%</div>
</div>

<div id="map"></div>

<div id="shop-screen" class="game-screen">
    <h2 style="color: #f39c12;">Maşyn Dükany</h2>
    
    <div class="shop-card">
        <img src="https://static.tildacdn.com/tild3061-3464-4235-b262-373462613133/hyundai_accent.png" alt="Hyundai">
        <div style="flex:1;">
            <b>Hyundai Accent</b><br>
            <small style="color:#2ecc71;">+1.66 TMT / gün</small><br>
            <button class="buy-btn" onclick="buyCar(150, 0.069)">150 TMT</button>
        </div>
    </div>

    <div class="shop-card">
        <img src="https://pngimg.com/uploads/toyota/toyota_PNG1952.png" alt="Toyota">
        <div style="flex:1;">
            <b>Toyota Prius</b><br>
            <small style="color:#2ecc71;">+4.74 TMT / gün</small><br>
            <button class="buy-btn" onclick="buyCar(444, 0.20)">444 TMT</button>
        </div>
    </div>

    <div class="shop-card">
        <img src="https://stimg.cardekho.com/sm/6324_v.jpg" alt="VW">
        <div style="flex:1;">
            <b>VW Polo</b><br>
            <small style="color:#2ecc71;">+12.2 TMT / gün</small><br>
            <button class="buy-btn" onclick="buyCar(1110, 0.51)">1110 TMT</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item" onclick="showScreen('map')">📍<br>Şäher</div>
    <div class="nav-item" onclick="showScreen('shop')">🛒<br>Magazin</div>
    <div class="nav-item">👤<br>Profil</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let player = { balance: 121.39, fuel: 100, income: 0.069 };

    // Karta sazlamalary
    var map = L.map('map', {zoomControl: false}).setView([37.94, 58.38], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Kartadaky Maşyn (Marker)
    var carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448636.png',
        iconSize: [45, 45]
    });
    var carMarker = L.marker([37.94, 58.38], {icon: carIcon}).addTo(map);

    // Oýun Logikasy (Pul we Hereket)
    setInterval(() => {
        if(player.fuel > 0) {
            // Pul goşmak
            player.balance += (player.income / 360);
            // Benzin azaltmak
            player.fuel -= 0.01;
            
            // Maşyny azajyk gymyldatmak (Realizm üçin)
            let lat = carMarker.getLatLng().lat + (Math.random() - 0.5) * 0.0005;
            let lng = carMarker.getLatLng().lng + (Math.random() - 0.5) * 0.0005;
            carMarker.setLatLng([lat, lng]);

            updateUI();
        }
    }, 1000);

    function updateUI() {
        document.getElementById('balance').innerText = player.balance.toFixed(2);
        document.getElementById('fuel-val').innerText = Math.floor(player.fuel);
    }

    function showScreen(name) {
        let shop = document.getElementById('shop-screen');
        if(name === 'shop') {
            shop.classList.add('active-screen');
        } else {
            shop.classList.remove('active-screen');
        }
    }

    function buyCar(price, income) {
        if(player.balance >= price) {
            player.balance -= price;
            player.income += income;
            alert("Täze maşyn alyndy! Girdeji artdy.");
            showScreen('map');
        } else {
            alert("Puluňyz ýetenok!");
        }
    }
</script>

</body>
</html>
