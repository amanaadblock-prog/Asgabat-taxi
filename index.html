<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi Fleet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .glass-card { background: rgba(24, 24, 27, 0.9); border: 1px solid rgba(63, 63, 70, 0.5); border-radius: 1.5rem; }
        .progress-bar { height: 6px; background: #27272a; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #f39c12; transition: width 0.5s linear; }
    </style>
</head>
<body class="p-4">

<div class="max-w-4xl mx-auto space-y-6">
    <div class="glass-card p-6 grid grid-cols-2 md:grid-cols-4 gap-4 shadow-2xl">
        <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
            <div class="text-zinc-400 text-xs mb-1 uppercase">Balans</div>
            <div class="text-orange-500 font-bold text-lg"><span id="balance">0.0000</span> TRY</div>
        </div>
        <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
            <div class="text-zinc-400 text-xs mb-1 uppercase">Maşynlar</div>
            <div class="font-bold text-lg">3</div>
        </div>
        <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
            <div class="text-zinc-400 text-xs mb-1 uppercase">Sagatlyk</div>
            <div class="text-green-500 font-bold text-lg">0.91 TRY</div>
        </div>
        <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
            <div class="text-zinc-400 text-xs mb-1 uppercase">Şäher</div>
            <div class="font-bold text-lg">Aşgabat</div>
        </div>
    </div>

    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold italic">Fleet Garage • Premium Control</h2>
            <div class="flex gap-2 text-xs">
                <button class="bg-orange-500 text-black px-4 py-2 rounded-xl font-bold">Maşyn Satyn Al</button>
                <button onclick="location.reload()" class="border border-zinc-700 px-4 py-2 rounded-xl">Täzele</button>
            </div>
        </div>

        <div id="car-list" class="grid md:grid-cols-3 gap-4">
            </div>
    </div>

    <div class="glass-card p-6">
        <h2 class="text-lg font-bold mb-4">Admin Analitika</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900">Günlük: <span id="daily" class="text-orange-400">0.00</span> TRY</div>
            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900">Hepdelik: <span id="weekly" class="text-orange-400">0.00</span> TRY</div>
            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900">User: demo@aman.dev</div>
        </div>
    </div>
</div>

<script>
    // MAŞYN MAGLUMATLARY
    const carsData = [
        { id: 1, name: 'Hyundai Accent', speed: 10, income: 0.11 },
        { id: 2, name: 'VW Polo', speed: 18, income: 0.51 },
        { id: 3, name: 'Toyota Corolla', speed: 14, income: 0.29 }
    ];

    const totalHourly = carsData.reduce((a, b) => a + b.income, 0);

    // ÝATDA SAKLAMAK WE OKAMAK (SAVE SYSTEM)
    let savedBal = parseFloat(localStorage.getItem('fleet_bal')) || 130.89;
    let lastTime = localStorage.getItem('fleet_time') || Date.now();

    // OFFLINE INCOME (Oýun ýapyk wagtyny hasapla)
    let now = Date.now();
    let secondsPassed = (now - lastTime) / 1000;
    let offlineEarnings = (secondsPassed / 3600) * totalHourly;
    
    let state = {
        balance: savedBal + offlineEarnings
    };

    // UI-DA MAŞYNLARY GÖRKEZMEK
    const carList = document.getElementById('car-list');
    carsData.forEach(car => {
        carList.innerHTML += `
            <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-800 space-y-3">
                <div class="flex justify-between items-start">
                    <div class="text-lg font-bold text-zinc-100">${car.name}</div>
                    <div class="text-[10px] bg-zinc-800 px-2 py-1 rounded text-zinc-400">${car.speed} km/h</div>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="prog-${car.id}" style="width: 0%"></div></div>
                <div class="text-xs text-zinc-400 flex justify-between">
                    <span>Girdeji:</span>
                    <span class="text-zinc-100">${car.income} TRY/h</span>
                </div>
            </div>
        `;
    });

    // DINAMIKI UPDATE
    setInterval(() => {
        // Balansy artdyr (Her sekuntda)
        state.balance += (totalHourly / 3600);
        
        // UI Täzele
        document.getElementById('balance').innerText = state.balance.toFixed(4);
        document.getElementById('daily').innerText = (totalHourly * 24).toFixed(2);
        document.getElementById('weekly').innerText = (totalHourly * 24 * 7).toFixed(2);

        // Progress bar animasiýasy
        carsData.forEach(car => {
            let prog = (Date.now() / (1000 / (car.speed/10))) % 100;
            document.getElementById(`prog-${car.id}`).style.width = prog + "%";
        });

        // ÝATDA SAKLA
        localStorage.setItem('fleet_bal', state.balance);
        localStorage.setItem('fleet_time', Date.now());
    }, 1000);

    // LUCIDE IKONKALARY IŞLET
    lucide.createIcons();
</script>

</body>
</html>
