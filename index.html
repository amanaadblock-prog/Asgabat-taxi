<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Fixed 3D</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 55vh; 
            background: #1a1a1a; border-top: 4px solid #f39c12; 
            z-index: 100; padding: 15px; box-sizing: border-box; 
            border-radius: 25px 25px 0 0;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 10px; color: #aaa; margin-bottom: 3px; }
        .stat-value { font-size: 15px; font-weight: bold; color: #f39c12; }
        .fuel-bar-wrap { background: #333; height: 24px; border-radius: 12px; position: relative; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: 0.5s; }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 3px; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; margin-bottom: 8px; cursor: pointer; }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-shop { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Balans (TMT)</div><div id="val-balance" class="stat-value">121.3969</div></div>
        <div class="stat-box"><div class="stat-label">Aýlyk</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div class="stat-label">Günlük</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div class="stat-label">Sagatlyk</div><div class="stat-value">+0.069</div></div>
    </div>

    <div class="fuel-bar-wrap">
        <div id="fuel-fill"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>

    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.942, 58.385], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 1. SURAT MESELESINI DOLY ÇÖZDIK (Base64 ulandym, hökman açylar)
    var taxiIcon = L.icon({
        iconUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAACXBIWXMAAAsTAAALEwEAmpwYAAABmElEQVR4nO2YwY3CMBBF35m0ABVQQSpIBUAFuAA6SAWpIBVABaiAClIBHZDZ8RAnYSeO7YREOfInS0K8mX/GnvG8iAjUarW6V9y6BvAGvALv7r0fG78F7vIn9Msh8gZ8A5fO6xH4Bv7pYIisgM97D3N+v0mIKCIn3O8jMclC5InXfUQuK6KIHHCvD8i8IopILff6YMoVUUQuuNd7866IKvIB97pX74qE3pXvY8oVUUUOuNf7clYk9I0sZ66ILH6B99yVs/8RWWYFPDtvX7B/E0VkgXvdmndFQu/O/M9ZIdLEa360fRZF5BvutXbeFZED7nWnrHlXRA64101OskKkidd9RC7pYIisgM97746P96KIKCIX3O9XfKyIInLEvX7Gx4koIifc61t8XImIIvIB97pdPq5ERBW54F7f4uNJRB6A96v5S+0XmX7Uu3uMvALfEAn9X7N67N777f98A88Vf+N/eW+P8B+4An7dY/wDP5AInm/YAAAAAElFTkSuQmCC', // Sary taksi iconasy
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    // 2. KÖÇE UGURLARY (Maşyn ýoldan gitmegi üçin)
    const routes = [
        [37.942, 58.385], [37.943, 58.385], [37.945, 58.385], 
        [37.945, 58.390], [37.942, 58.390], [37.940, 58.388]
    ];
    let routeIdx = 0;
    var marker = L.marker(routes[0], {icon: taxiIcon}).addTo(map);

    let state = {
        balance: 121.3969,
        fuel: 100,
        income: 0.0002 // Balans indi has tiz köpeler
    };

    function updateUI() {
        document.getElementById('val-balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-fill').style.width = state.fuel + "%";
        document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
    }

    // 3. HEREKET VE BALANS LOGIKASY
    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += state.income; // Balans köpelýär
            state.fuel -= 0.01; // Benzin 2 gün ýaly gider

            // Köçe ugry bilen öňe gitmek
            routeIdx = (routeIdx + 1) % routes.length;
            let nextPos = routes[routeIdx];
            
            marker.setLatLng(nextPos);
            map.panTo(nextPos); // Kamera yzarlaýar
            
            updateUI();
        }
    }, 1500);

    function refill() {
        if(state.balance >= 0.20) {
            state.balance -= 0.20;
            state.fuel = 100;
            updateUI();
        }
    }

    updateUI();
</script>
</body>
</html>
