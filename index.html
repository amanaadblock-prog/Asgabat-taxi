<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Ultimate Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; z-index: 1; border-bottom: 2px solid #333; }
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 55vh; 
            background: #1a1a1a; border-top: 4px solid #f39c12; 
            z-index: 100; padding: 20px; box-sizing: border-box; 
            border-radius: 30px 30px 0 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #222; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #f39c12; }
        .fuel-bar-wrap { background: #333; height: 28px; border-radius: 14px; position: relative; margin-bottom: 20px; border: 1px solid #444; overflow: hidden; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 5px; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; active { transform: scale(0.98); } }
        .btn-zap { background: #f39c12; color: #000; box-shadow: 0 4px #d35400; }
        .btn-shop { background: #34495e; color: #fff; box-shadow: 0 4px #2c3e50; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Balans (TMT)</div><div id="val-balance" class="stat-value">121.4015</div></div>
        <div class="stat-box"><div class="stat-label">Aýlyk</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div class="stat-label">Günlük</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div class="stat-label">Sagatlyk</div><div class="stat-value">+0.069</div></div>
    </div>
    <div class="fuel-bar-wrap">
        <div id="fuel-fill"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>
    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.942, 58.385], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // HAKYKY GÖRNÜŞLI TAXI ICONASY
    var taxiIcon = L.divIcon({
        html: `
            <div style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));">
                <svg width="55" height="35" viewBox="0 0 50 30">
                    <rect x="2" y="12" width="46" height="14" rx="4" fill="#f1c40f" stroke="#222" stroke-width="2"/>
                    <path d="M12 12 L18 4 L32 4 L38 12 Z" fill="#3498db" stroke="#222" stroke-width="1.5"/>
                    <rect x="20" y="2" width="10" height="3" fill="#000" rx="1"/> 
                    <circle cx="12" cy="26" r="5" fill="#111" stroke="#333" stroke-width="1"/>
                    <circle cx="38" cy="26" r="5" fill="#111" stroke="#333" stroke-width="1"/>
                    <rect x="44" y="15" width="4" height="6" fill="#e74c3c" rx="1"/> 
                </svg>
            </div>`,
        className: 'custom-taxi',
        iconSize: [55, 35],
        iconAnchor: [27, 17]
    });

    const routes = [
        [37.9422, 58.3852], [37.9440, 58.3852], [37.9460, 58.3852], 
        [37.9460, 58.3885], [37.9440, 58.3915], [37.9422, 58.3915]
    ];
    let routeIdx = 0;
    var marker = L.marker(routes[0], { icon: taxiIcon, zIndexOffset: 1000 }).addTo(map);

    let state = {
        balance: 121.4015,
        fuel: 100,
        income: 0.00015 
    };

    function updateUI() {
        document.getElementById('val-balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-fill').style.width = state.fuel + "%";
        document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
        
        // Benzin azalsa reňki üýtgeýär
        if(state.fuel < 20) document.getElementById('fuel-fill').style.background = "#e74c3c";
        else document.getElementById('fuel-fill').style.background = "linear-gradient(90deg, #27ae60, #2ecc71)";
    }

    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += state.income;
            state.fuel -= 0.01; 

            routeIdx = (routeIdx + 1) % routes.length;
            marker.setLatLng(routes[routeIdx]);
            map.panTo(routes[routeIdx], { animate: true, duration: 1.5 }); 
            
            updateUI();
        }
    }, 2500);

    function refill() {
        if(state.balance >= 0.20) {
            state.balance -= 0.20;
            state.fuel = 100;
            updateUI();
        }
    }
    updateUI();
</script>
</body>
</html>
