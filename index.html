<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi - Final Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        .ui-container { 
            position: fixed; bottom: 0; width: 100%; height: 55vh; 
            background: #1a1a1a; border-top: 4px solid #f39c12; 
            z-index: 100; padding: 15px; box-sizing: border-box; 
            border-radius: 25px 25px 0 0;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 15px; font-weight: bold; color: #f39c12; }
        .fuel-bar-wrap { background: #333; height: 24px; border-radius: 12px; position: relative; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; }
        #fuel-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); }
        #fuel-text { position: absolute; width: 100%; text-align: center; top: 3px; font-size: 12px; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        .btn-zap { background: #f39c12; color: #000; }
        .btn-shop { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-container">
    <div class="stats-grid">
        <div class="stat-box"><div>BALANS</div><div id="val-balance" class="stat-value">121.3983</div></div>
        <div class="stat-box"><div>AÝLYK</div><div class="stat-value">+50.00</div></div>
        <div class="stat-box"><div>GÜNLÜK</div><div class="stat-value">+1.66</div></div>
        <div class="stat-box"><div>SAGATLYK</div><div class="stat-value">+0.069</div></div>
    </div>
    <div class="fuel-bar-wrap">
        <div id="fuel-fill"></div>
        <div id="fuel-text">Benzin: 100%</div>
    </div>
    <button class="btn btn-zap" onclick="refill()">⛽ ZAPRAWKA ET (0.20 TMT)</button>
    <button class="btn btn-shop">🛒 MAGAZIN / BAZAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.942, 58.385], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // MAŞYN SURATY (Base64 formaty - Hökman açylar)
    var taxiIcon = L.icon({
        iconUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAByklEQVRYhe2Yv0vDUBDHv0mDVYfSUnAtSLeC6OigDjo66uSgo6ODooOig046OujkoKODo6ODo4Oig9Ym0EGtY60Opf+Ad7m0vLteXpI08YMPXpL77nv3fvcuyR0hxH+S58AL8AnY6m98Ad+AbeC990vE/YAn4AnY6m9+Ap+AZ+C5X0vEjf4V4E3/uDfwDPwA7/1cAnXgS0S2vA6Yv/Y+7Tf94xLqALh7vY7H2UvYg2DujWvYp2Ceg3nvre8m7Inp4fXahI3A8Z64W4WNCHev17C3fBswF8G896XvDuyZ6eH12oT1mB5er8HcnpkeXq9NWA8c77C7VdiInOewu1VYD5zv6Xf1H9K+S9iInOe0300Y67D71X67YaxDz3PahI3Iea6bMGLqFfkLpInX/Iic03/9950T8SmiC8SXiC4QXyK6QHyJ6ALxJaILxJeILhBfIrpAfInoAvElois0v0S6P7GvG1pX6i+uY6v4fH0X8W/C7IvpInG7XyKe6C6O236JiBOfO8fLzN10ET9I3O6XiCe6i+O2XyLixOfO8TJzN13EDxK3+yXiiU96iFzSrT0An4BN4K2/8RH4BF76vUR8An8i8A3Y6r/PZ2DLv/N/v7eH+Ad+X3/rF/gT6AAAAABJRU5ErkJggg==',
        iconSize: [45, 45],
        iconAnchor: [22, 22]
    });

    // AŞGABAT KÖÇELERI (Ýol ugry)
    const routes = [
        [37.942, 58.385], [37.9435, 58.385], [37.945, 58.385], 
        [37.945, 58.390], [37.9435, 58.390], [37.942, 58.390]
    ];
    let routeIdx = 0;
    var marker = L.marker(routes[0], {icon: taxiIcon}).addTo(map);

    let state = {
        balance: 121.3983,
        fuel: 100,
        income: 0.0001
    };

    function updateUI() {
        document.getElementById('val-balance').innerText = state.balance.toFixed(4);
        document.getElementById('fuel-fill').style.width = state.fuel + "%";
        document.getElementById('fuel-text').innerText = "Benzin: " + Math.floor(state.fuel) + "%";
    }

    // HEREKET WE BALANS
    setInterval(() => {
        if(state.fuel > 0) {
            state.balance += state.income; // Balans köpelýär
            state.fuel -= 0.005; // Benzin 2 gün ýeter ýaly haýal

            routeIdx = (routeIdx + 1) % routes.length;
            let nextPos = routes[routeIdx];
            marker.setLatLng(nextPos);
            map.panTo(nextPos); // Kamera yzarlaýar
            
            updateUI();
        }
    }, 2000);

    function refill() {
        if(state.balance >= 0.20) {
            state.balance -= 0.20;
            state.fuel = 100;
            updateUI();
        }
    }
    updateUI();
</script>
</body>
</html>
