<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Taxi Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 60vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        
        /* UI Panel */
        .ui-container {
            position: fixed; bottom: 0; width: 100%; height: 40vh;
            background: #1a1a1a; border-top: 3px solid #f39c12;
            z-index: 100; padding: 15px; box-sizing: border-box;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            overflow-y: auto;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-box { background: #252525; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 10px; color: #888; }
        .stat-value { font-size: 14px; font-weight: bold; color: #f39c12; }

        /* Magazin */
        .shop-screen { display: none; margin-top: 10px; }
        .shop-item { 
            background: #252525; padding: 10px; border-radius: 10px; 
            margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
        }
        .shop-item img { width: 60px; }

        .fuel-bar { width: 100%; background: #333; height: 10px; border-radius: 5px; margin: 10px 0; }
        .fuel-fill { background: #2ecc71; height: 100%; width: 100%; border-radius: 5px; transition: 0.5s; }

        .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-refill { background: #f39c12; color: #000; }
        .btn-shop { background: #34495e; color: #fff; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div id="main-panel">
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-label">BALANS</div><div class="stat-value" id="balance">121.39</div></div>
            <div class="stat-box"><div class="stat-label">AÝLYK</div><div class="stat-value">+50.00</div></div>
            <div class="stat-box"><div class="stat-label">GÜNLÜK</div><div class="stat-value">+1.66</div></div>
            <div class="stat-box"><div class="stat-label">SAGATLYK</div><div class="stat-value">+0.069</div></div>
        </div>
        
        <div style="font-size: 12px;">⛽ Benzin Rezwerwi: <span id="fuel-txt">100</span>%</div>
        <div class="fuel-bar"><div id="fuel-level" class="fuel-fill"></div></div>

        <button class="btn btn-refill" onclick="refill()">Zaprawka Et (1 TMT)</button>
        <button class="btn btn-shop" onclick="toggleShop()">🛒 Magazin</button>
    </div>

    <div id="shop-screen" class="shop-screen">
        <h3 style="color: #f39c12; margin-top: 0;">Maşyn Satyn Al</h3>
        <div class="shop-item">
            <img src="https://cdn-icons-png.flaticon.com/512/3448/3448636.png">
            <div style="font-size: 12px;"><b>Toyota Prius</b><br>+4.74 TMT/gün</div>
            <button onclick="alert('Puluňyz ýetenok!')" style="background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:5px;">444 TMT</button>
        </div>
        <button class="btn" onclick="toggleShop()" style="background:#c0392b;">Yza Gaýt</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Karta we Maşyn
    var map = L.map('map', {zoomControl: false}).setView([37.95, 58.38], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Maşyn Markerini Goşmak (Seniň isleýän maşynyň)
    var carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448636.png', // Taksi ikonasy
        iconSize: [45, 45]
    });
    var car = L.marker([37.95, 58.38], {icon: carIcon}).addTo(map);

    // Oýun Maglumatlary
    let player = { balance: 121.3910, fuel: 100 };

    // Maşyn Hereketi we Pul Hasaby
    setInterval(() => {
        if(player.fuel > 0) {
            player.balance += 0.0001;
            player.fuel -= 0.02;
            
            // Maşyny azajyk gymyldatmak
            let newLat = car.getLatLng().lat + (Math.random() - 0.5) * 0.0005;
            let newLng = car.getLatLng().lng + (Math.random() - 0.5) * 0.0005;
            car.setLatLng([newLat, newLng]);
            
            updateUI();
        }
    }, 2000);

    function updateUI() {
        document.getElementById('balance').innerText = player.balance.toFixed(4);
        document.getElementById('fuel-txt').innerText = Math.floor(player.fuel);
        document.getElementById('fuel-level').style.width = player.fuel + "%";
    }

    function toggleShop() {
        let shop = document.getElementById('shop-screen');
        let main = document.getElementById('main-panel');
        if(shop.style.display === "none" || shop.style.display === "") {
            shop.style.display = "block";
            main.style.display = "none";
        } else {
            shop.style.display = "none";
            main.style.display = "block";
        }
    }

    function refill() {
        if(player.balance >= 1) {
            player.balance -= 1;
            player.fuel = 100;
            updateUI();
        }
    }
</script>
</body>
</html>
